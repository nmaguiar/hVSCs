    Fingerprint: sha256:4bf89f2dadf4694521186d237329a6e734505cb713c591a6ce1ff983076dc737
    Title: 'nginx: NGINX: Arbitrary code execution via crafted HTTP requests'
    Description: "A vulnerability exists in NGINX Plus and NGINX Open Source when a map\_directive uses regex matching and a string expression references the map's regex capture variables before referencing the map output variable. Alternatively, the same result could be achieved by using a non-cacheable variable in a string expression under certain conditions. An unauthenticated attacker along with conditions beyond their control can exploit this vulnerability by sending crafted HTTP requests. This may cause a heap buffer overflow in the NGINX worker process leading to a restart. Additionally, attackers can execute code on systems with Address Space Layout Randomization (ASLR) disabled or when the attacker can bypass ASLR.\n\nImpact:\nThis vulnerability may allow remote attackers to cause a denial-of-service (DoS) on the NGINX system or to possibly trigger a code execution. There is no control plane exposure; this is a data plane issue only.\n\n\n\n\n\_Note: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
