    Fingerprint: sha256:04de66a3bf2fdbc26b172845c402f6c82100ac440b05dc90e77c02f9ff446929
    Title: 'nginx: NGINX: Arbitrary code execution or Denial of Service via heap-based buffer overflow with crafted HTTP/2 headers'
    Description: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_proxy_v2_module\_and ngx_http_grpc_module\_modules. This vulnerability exists when the proxy_http_version to 2\_or grpc_pass\_directives are used to proxy HTTP/2 traffic, the ignore_invalid_headers\_directive is set to off, and the large_client_header_buffers\_directive size is larger than 2 megabytes. A remote, unauthenticated attacker, along with conditions beyond their control, could send large headers while creating an upstream request. This may cause a heap-based buffer overflow in the NGINX worker process leading to a restart. Additionally, attackers can execute code on systems with Address Space Layout Randomization (ASLR) disabled or when the attacker can bypass ASLR. \n\n\nNote: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
