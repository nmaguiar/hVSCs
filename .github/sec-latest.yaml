    Title: 'nginx: NGINX: Memory disclosure or denial of service via ngx_http_charset_module heap buffer over-read'
    Description: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_charset_module\_module. When content is served or proxied through a location block with both source_charset\_utf-8; and a charset\_directive (for example, charset koi8-r;) configured, remote, unauthenticated attackers can send requests (in conjunction with conditions beyond their control) to cause a heap buffer over-read in the NGINX worker process, leading to limited disclosure of memory or a restart. \n\n\nNote: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
