    Title: 'nginx: ngx_http_ssl_module: data corruption and denial of service'
    Description: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_ssl_module\_module when the ssl_verify_client\_directive is set to \"on\" or \"optional,\" and the ssl_ocsp\_directive is set to \"on\" or the leaf\_parameters are configured with a resolver. With this configuration, an unauthenticated attacker can send requests along with conditions beyond its control that may cause a heap-use-after-free error in the NGINX worker process. This vulnerability may result in limited modification of data or the NGINX worker process restarting.\n\n\n\n\_Note: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
